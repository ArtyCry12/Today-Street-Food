<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today Street Food - Чатбот</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d10; --surface: #14141a; --surface2: #1c1c26;
  --border: rgba(255,255,255,0.07); --accent: #00d4aa;
  --text: #e8e8f0; --muted: #6b6b80; --heading: #ffffff;
}

body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; font-size: 14px; }

.wrapper { max-width: 900px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; padding: 0; }

/* HEADER */
.chat-header {
  background: linear-gradient(135deg, rgba(0,212,170,0.12), rgba(108,99,255,0.08));
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  flex-shrink: 0;
}
.chat-header h1 { font-size: 16px; font-weight: 800; color: var(--heading); margin-bottom: 2px; }
.chat-header p { font-size: 12px; color: var(--muted); }
.status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-right: 6px; }

/* MESSAGES */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.message {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.message.bot { justify-content: flex-start; }
.message.user { justify-content: flex-end; }

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.avatar.bot { background: rgba(0,212,170,0.15); color: var(--accent); }
.avatar.user { background: rgba(108,99,255,0.15); color: #6c63ff; }

.bubble {
  max-width: 70%;
  padding: 10px 14px;
  border-radius: 12px;
  line-height: 1.5;
  word-wrap: break-word;
  font-size: 13px;
}
.message.bot .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
}
.message.user .bubble {
  background: rgba(0,212,170,0.2);
  color: white;
  border: 1px solid rgba(0,212,170,0.3);
}

.buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.btn-quick {
  padding: 7px 12px;
  border-radius: 6px;
  border: 1px solid rgba(0,212,170,0.3);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.2s;
  font-family: 'Manrope', sans-serif;
}
.btn-quick:hover {
  background: rgba(0,212,170,0.1);
  border-color: rgba(0,212,170,0.5);
}

/* INPUT */
.chat-input {
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  flex-shrink: 0;
  display: flex;
  gap: 8px;
  background: var(--surface);
}
.input-field {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--text);
  font-family: 'Manrope', sans-serif;
  font-size: 13px;
}
.input-field::placeholder { color: var(--muted); }
.input-field:focus { outline: none; border-color: var(--accent); }

.send-btn {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #0d0d10;
  cursor: pointer;
  font-weight: 800;
  font-size: 16px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.send-btn:hover { transform: scale(1.05); }
.send-btn:active { transform: scale(0.95); }

/* SCROLL */
.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: rgba(0,212,170,0.2); border-radius: 3px; }
.messages::-webkit-scrollbar-thumb:hover { background: rgba(0,212,170,0.4); }

@media (max-width: 600px) {
  .bubble { max-width: 85%; }
  .chat-header { padding: 12px 16px; }
  .messages { padding: 16px; }
  .chat-input { padding: 10px 12px; gap: 6px; }
}
</style>
</head>
<body>
<div class="wrapper">

  <div class="chat-header">
    <h1>🍖 Today Street Food</h1>
    <p><span class="status"></span>Онлайн · Ответ в течение минуты</p>
  </div>

  <div class="messages" id="messages">
    <div class="message bot">
      <div class="avatar bot">🤖</div>
      <div class="bubble">
        Привет! 👋 Я помощник Today Street Food. Могу помочь с информацией о меню, доставке, часах работы или ответить на вопросы. Что вас интересует?
        <div class="buttons">
          <button class="btn-quick" onclick="sendMessage('📋 Что у вас есть в меню?')">Меню</button>
          <button class="btn-quick" onclick="sendMessage('⏰ Во сколько вы открыты?')">Часы работы</button>
          <button class="btn-quick" onclick="sendMessage('🚚 Как заказать доставку?')">Доставка</button>
          <button class="btn-quick" onclick="sendMessage('💵 Какие цены?')">Цены</button>
        </div>
      </div>
    </div>
  </div>

  <div class="chat-input">
    <input type="text" class="input-field" id="input" placeholder="Напишите вопрос..." onkeypress="if(event.key==='Enter') send()">
    <button class="send-btn" onclick="send()">➤</button>
  </div>

</div>

<script>
const responses = {
  // МЕНЮ
  'меню|что есть|товары|блюда|что вы готовите|что у вас': {
    reply: `На Today Street Food готовят вкусные кебабы и шаурму:

🍖 **Кебаб мясной** 400г (говядина/курица, овощи, соус) — 65 lei
🌮 **Кебаб с фалафелем** 400г (вегетарианский) — 55 lei
🥩 **Шаурма двойная** (двойное мясо, сыр, бекон) — 75 lei
🐔 **Шаурма с курицей** crispy (курица, овощи) — 60 lei

Также есть:
🍟 Картофель фри 
🍹 Напитки (кола, фанта, спрайт)
🍺 Пиво

Хотите узнать больше о каком-то блюде?`,
    buttons: ['Кебаб мясной', 'Фалафель', 'Доставка']
  },

  // ЦЕНЫ
  'цена|сколько|дорого|стоимость|расценки': {
    reply: `💵 **Наши цены:**

🍖 Кебаб (мясной, 400г) — **65 MDL**
🌮 Фалафель (400г) — **55 MDL**
🥩 Шаурма двойная — **75 MDL**
🐔 Шаурма с курицей — **60 MDL**
🍟 Картофель фри — **25 MDL**

Доставка бесплатна для заказов от 150 MDL в центр города.

Хотите заказать?`,
    buttons: ['Как заказать?', 'Доставка', 'Часы работы']
  },

  // АДРЕС
  'адрес|где вы|местоположение|находитесь|улица': {
    reply: `📍 **Наш адрес:**

Today Street Food
ул. Независимости, 50B
Кишинёв, Молдова

🚗 Легко паркуется
🚶 Рядом остановки транспорта
☎️ +373 695 XX-XXX (позвоните для уточнения)

Приезжайте или закажите доставку! 🚚`,
    buttons: ['Доставка', 'Как заказать?', 'Часы работы']
  },

  // ЧАСЫ
  'часы|работа|открыт|закрыт|время|когда': {
    reply: `⏰ **Режим работы:**

📅 **Пн-Чт:** 11:00 - 23:00
📅 **Пт-Сб:** 11:00 - 00:30 (до 12:30 ночи)
📅 **Воскресенье:** 12:00 - 23:00

🚚 **Доставка:** 11:00 - 22:30 (макс. 45 мин)

Прямо сейчас мы открыты! Что закажете? 😋`,
    buttons: ['Меню', 'Доставка', 'Контакты']
  },

  // ДОСТАВКА
  'доставка|привезти|заказать домой|как доставить': {
    reply: `🚚 **Как заказать доставку:**

1️⃣ Позвоните нам: +373 695 XX-XXX
2️⃣ Или закажите через Glovo/Straus
3️⃣ Назовите адрес
4️⃣ Заказ приедет за 30-45 минут

💳 **Оплата:**
- Наличные при получении
- Карта (через приложение Glovo)

✅ **Бесплатная доставка** от 150 MDL в центр города

Что заказать?`,
    buttons: ['Меню', 'Цены', 'Контакты']
  },

  // СПОСОБЫ ОПЛАТЫ
  'оплата|карта|наличные|платёж|как платить': {
    reply: `💳 **Способы оплаты:**

💵 **Наличные** — при получении (доставка или офис)
💳 **Карта** — через Glovo, Straus, или в офисе (терминал)
📱 **Мобильный платёж** — Vodafone Cash, IPAY

Самый быстрый способ — через Glovo или Straus. Есть вопросы?`,
    buttons: ['Меню', 'Доставка', 'Адрес']
  },

  // КОНТАКТЫ
  'контакты|телефон|звонить|номер|связь': {
    reply: `☎️ **Свяжитесь с нами:**

📞 +373 695 XX-XXX (звоните или WhatsApp)
📍 ул. Независимости, 50B, Кишинёв
⏰ Пн-Сб: 11:00 - 00:30 | Вс: 12:00 - 23:00

📦 Доставка через:
- Glovo
- Straus

Что-то срочное? Позвоните сейчас! 📞`,
    buttons: ['Меню', 'Доставка', 'Часы работы']
  },

  // ДОСТАВКА ВРЕМЯ
  'быстро|сколько|минут|долго|когда придёт': {
    reply: `⏱️ **Время доставки:**

🚚 **В среднем 30-45 минут** от момента заказа

🏢 **В центр города (Botanica, Telecentru)** — быстрее (30 мин)
🚗 **На окраину** — может быть дольше (до 60 мин)

Можете отследить доставку в приложении Glovo в реальном времени 📍

Хотите заказать?`,
    buttons: ['Меню', 'Доставка', 'Доставка от какой суммы?']
  },

  // МИНИМАЛЬНЫЙ ЗАКАЗ
  'минимум|сумма|от скольки|минимальная': {
    reply: `💰 **Минимальный заказ:**

❌ **Без минимума** при заказе с офиса (съесть здесь)

✅ **Доставка**: минимум **150 MDL** для бесплатной доставки
(меньше 150 MDL — доставка 15 MDL)

💡 Кебаб (65 MDL) + Картофель (25 МДЛ) + Напиток (20 MDL) = 110 MDL (или +15 за доставку)

Хотите заказать? 🛒`,
    buttons: ['Меню', 'Цены', 'Доставка']
  },

  // ИНГРЕДИЕНТЫ / АЛЛЕРГИЯ
  'ингредиенты|аллергия|без|глютен|острое|соус': {
    reply: `🌶️ **Важная информация:**

✅ **Кебабы готовятся перед вами** — вы выбираете:
- Уровень остроты (соус можно без)
- Овощи (помидоры, огурцы, капуста, лук)
- Тип мяса (говядина или курица)

⚠️ **Аллергия?** Позвоните перед заказом: +373 695 XX-XXX
Мы можем приготовить без глютена, без молока и т.д.

🌱 **Вегетарианское** — кебаб с фалафелем (55 MDL)

Какой вам кебаб?`,
    buttons: ['Меню', 'Заказать', 'Контакты']
  },

  // ИЗМЕНЕНИЯ / ДОП ОПЦИИ
  'больше|меньше|добавить|убрать|изменить|без': {
    reply: `🛠️ **Можно изменять:**

✅ **Добавить ингредиенты** — +5-10 MDL
✅ **Убрать что-то** — бесплатно
✅ **Больше соуса** — +5 MDL
✅ **Острее** — можно просить дополнительный острый соус

Просто скажите при заказе или позвоните:
📞 +373 695 XX-XXX

Какой порядок хотите?`,
    buttons: ['Меню', 'Как заказать?', 'Доставка']
  },

  // РАБОТЫ / ОТЗЫВЫ
  'отзывы|рейтинг|оценка|как люди|качество': {
    reply: `⭐ **Мы нравимся людям!**

Наши клиенты говорят:
- "Вкусно и быстро!" 👍
- "Свежие ингредиенты" 🥗
- "Хорошие цены" 💰
- "Дружелюбный сервис" 😊

📱 Смотрите отзывы на Glovo, Straus, TripAdvisor

Хотите попробовать? Сейчас открыты! 🎉`,
    buttons: ['Меню', 'Заказать', 'Часы работы']
  },

  // ГРУСТНОЕ - НЕ ПОНЯЛ
  'привет|привет|hi|hello|спасибо': {
    reply: `Привет! 👋 Спасибо за вопрос! Если что-то не ясно, напишите подробнее. Я здесь, чтобы помочь! 😊`,
    buttons: ['Меню', 'Доставка', 'Контакты']
  },

  'спасибо|спасибо тебе|благодарю': {
    reply: `😊 С удовольствием! Приятного аппетита! 🍖\n\nЧто ещё нужно?`,
    buttons: ['Меню', 'Доставка', 'До встречи!']
  },

  'пока|до свидания|до встречи': {
    reply: `👋 До встречи! Приходите к нам снова!\n\n🍖 Today Street Food ждёт вас! 😊`,
    buttons: []
  }
};

function findResponse(text) {
  text = text.toLowerCase().trim();
  
  for (const [keywords, data] of Object.entries(responses)) {
    const keywordArray = keywords.split('|');
    if (keywordArray.some(kw => text.includes(kw))) {
      return data;
    }
  }
  
  return {
    reply: `Хм, не совсем понял вопрос 🤔 Попробуйте спросить о:\n\n📋 Меню\n⏰ Часах работы\n🚚 Доставке\n💵 Ценах\n📞 Контактах`,
    buttons: ['Меню', 'Доставка', 'Часы работы', 'Контакты']
  };
}

function addMessage(text, isUser) {
  const messagesDiv = document.getElementById('messages');
  const message = document.createElement('div');
  message.className = `message ${isUser ? 'user' : 'bot'}`;
  
  const avatar = document.createElement('div');
  avatar.className = `avatar ${isUser ? 'user' : 'bot'}`;
  avatar.textContent = isUser ? '👤' : '🤖';
  
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  
  message.appendChild(avatar);
  message.appendChild(bubble);
  messagesDiv.appendChild(message);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function addButtons(buttons) {
  if (!buttons || buttons.length === 0) return;
  
  const messagesDiv = document.getElementById('messages');
  const message = document.createElement('div');
  message.className = 'message bot';
  
  const buttonsDiv = document.createElement('div');
  buttonsDiv.className = 'buttons';
  buttonsDiv.style.marginLeft = '40px';
  
  buttons.forEach(btn => {
    const button = document.createElement('button');
    button.className = 'btn-quick';
    button.textContent = btn;
    button.onclick = () => sendMessage(btn);
    buttonsDiv.appendChild(button);
  });
  
  message.appendChild(buttonsDiv);
  messagesDiv.appendChild(message);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  
  if (!text) return;
  
  addMessage(text, true);
  input.value = '';
  
  setTimeout(() => {
    const response = findResponse(text);
    addMessage(response.reply, false);
    addButtons(response.buttons);
  }, 300);
}

function sendMessage(text) {
  document.getElementById('input').value = text;
  send();
}

// Enter to send
document.getElementById('input').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') send();
});

// Focus input on load
window.addEventListener('load', () => {
  document.getElementById('input').focus();
});
</script>
</body>
</html>
